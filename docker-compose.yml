services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  prestart:
    build:
      context: ./backend
    volumes:
      - ./scripts:/app/scripts
    env_file:
      - .env
    command: bash /app/scripts/prestart.sh
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      prestart:
        condition: service_completed_successfully
    command: fastapi run app/main.py --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
