---
name: Claude Issue Reviewer

on:
  workflow_call:
    inputs:
      prompt:
        description: 'Custom prompt for Claude when analyzing the issue'
        required: false
        type: string
        default: |
          You are an expert software engineer. Analyze this GitHub issue thoroughly.
          1. Add a comment to the issue with your analysis: root cause, affected files, and a suggested fix approach.
          2. If you can identify a fix, create a pull request with the changes.
          Keep your analysis concise and actionable.
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude'
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  review-issue:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Issue Reviewer
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 10"
          additional_permissions: |
            Bash(git:*)
            Bash(gh:*)
            Bash(ls:*)
            Bash(cat:*)
            Bash(find:*)
            Bash(grep:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(npm:*)
            Bash(npx:*)
            Bash(bun:*)
            Bash(uv:*)
